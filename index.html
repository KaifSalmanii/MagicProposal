<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-site-verification" content="HigXoTddIICIqIAsvCnztZm-5wH6s38pxb8I_2HjkMk" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valentine Proposal Link | Magic Proposal</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600&family=Montserrat:wght@700&family=Dancing+Script:wght@700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Lexend', sans-serif; }
        body { background: #ffe5ec; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow-x: hidden; perspective: 1500px; }
        #splash-screen { position: fixed; inset: 0; background: #ff4d6d; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.8s ease; }
        .heart-loader { font-size: 60px; animation: beat 1s infinite; color: white; }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }
        .bg-animate { position: fixed; top:0; left:0; width:100%; height:100%; background: linear-gradient(135deg, #ffafcc 0%, #ffc2d1 100%); z-index: -1; }
        .card-container { width: 350px; height: 460px; position: relative; transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10; }
        .is-flipped { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); border-radius: 30px; padding: 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid rgba(255, 255, 255, 0.5); }
        .card-back { transform: rotateY(180deg); }
        h1 { font-family: 'Montserrat', sans-serif; color: #ff4d6d; font-size: 1.7rem; margin-bottom: 25px; text-transform: uppercase; text-align: center; }
        input { width: 100%; padding: 14px 20px; border-radius: 50px; border: 2px solid #ffccd5; margin-bottom: 15px; outline: none; transition: 0.3s; }
        .btn { width: 100%; padding: 13px; border: none; border-radius: 50px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; }
        .btn-gen { background: #ff4d6d; color: white; position: relative; overflow: hidden; }
        .btn-copy { background: #4cc9f0; color: white; }
        .btn-wa { background: #6366f1; color: white; }
        .btn-pre { background: #f8f9fa; color: #333; border: 1px solid #ddd; }
        .progress-fill { position: absolute; left: 0; top: 0; height: 100%; background: rgba(0,0,0,0.15); width: 0%; transition: width 2s linear; }
        .envelope { font-size: 90px; cursor: pointer; animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .btn-group { display: flex; gap: 15px; width: 100%; justify-content: center; margin-top: 35px; position: relative; }
        .yes-btn { background: linear-gradient(135deg, #ff4d6d, #ff758f); color: white; width: 120px; box-shadow: 0 10px 20px rgba(255, 77, 109, 0.3); }
        .no-btn { background: #ffffff; color: #8d99ae; width: 110px; border: 2px solid #eee; transition: 0.1s; pointer-events: auto; }
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); color: #ff4d6d; padding: 15px 35px; border-radius: 50px; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10000; font-weight: 600; box-shadow: 0 15px 30px rgba(255, 77, 109, 0.2); border: 1px solid rgba(255, 255, 255, 0.5); }
        .success-page { position: fixed; inset: 0; background: #fff0f3; z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .love-note { font-family: 'Dancing Script', cursive; font-size: 1.6rem; color: #444; margin: 25px; max-width: 320px; min-height: 80px; line-height: 1.6; }
        .footer-info { margin-top: 25px; text-align: center; color: #7d7d7d; font-size: 0.75rem; max-width: 320px; z-index: 5; }
        .dev-badge { background: white; padding: 5px 15px; border-radius: 50px; display: inline-block; margin-bottom: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-decoration: none; color: #ff4d6d; font-weight: 600; }
    </style>
</head>
<body>

<div id="splash-screen">
    <div class="heart-loader">❤️</div>
    <p style="color: white; margin-top: 15px; font-weight: 600; letter-spacing: 2px;">CREATING MAGIC...</p>
</div>

<audio id="yehhSound" src="https://www.myinstants.com/media/sounds/kids-cheering.mp3"></audio>
<div class="bg-animate"></div>
<div id="toast"><span>❤️</span> <span id="toastMsg">Success!</span></div>

<div class="card-container" id="card">
    <div class="card-front" id="setupView">
        <h1>Magic Proposal ✨</h1>
        <input type="text" id="uName" placeholder="Your Name">
        <input type="text" id="pName" placeholder="Crush Name">
        <button class="btn btn-gen" onclick="startProcessing()">
            <div class="progress-fill" id="pFill"></div>
            <span id="btnText">Create Magic Link 💌</span>
        </button>
        <a href="https://kaifsalmani-portfolio.blogspot.com/?m=1" target="_blank" class="dev-badge">Developed by: Kaif Salmani 🩷</a>
    </div>

    <div class="card-back">
        <h1>It's Ready!</h1>
        <button class="btn btn-copy" onclick="copyLink()">📋 Copy Link</button>
        <button class="btn btn-wa" onclick="shareLink()">🚀 Share Anywhere</button>
        <button class="btn btn-pre" onclick="previewNow()">👁️ Live Preview</button>
        <p onclick="location.reload()" style="font-size: 0.75rem; margin-top: 25px; cursor: pointer; color: #ff4d6d;">Create New Link</p>
    </div>
</div>

<div id="crushView" style="display:none; text-align:center; z-index: 100;" class="card-front">
    <div id="envelope" onclick="openLetter()">
        <div class="envelope">💌</div>
        <p style="color: #ff4d6d; font-weight: 600;">Open your surprise!</p>
    </div>
    <div id="letter" style="display:none;">
        <h1 id="propTitle">...</h1>
        <p id="propFrom" style="color: #888; font-size: 0.85rem; margin-bottom: 5px;"></p>
        <div class="btn-group">
            <button class="btn yes-btn" onclick="celebrate()">YES ❤️</button>
            <button class="btn no-btn" id="noBtn">NO 💔</button>
        </div>
    </div>
</div>

<div class="footer-info" id="footerInfo">
    <p>Developed with ❤️ by <span style="color:#ff4d6d; font-weight:600;">Kaif Salmani</span></p>
    <p style="margin-top: 10px; font-size: 0.65rem; opacity: 0.7;">
        <strong>Disclaimer:</strong> This is a fun prank application for entertainment purposes only.
    </p>
</div>

<div class="success-page" id="successPage">
    <h1 style="font-size: 5rem;">🥰</h1>
    <h1 style="font-family: 'Montserrat'; color: #ff4d6d;">I Knew It!</h1>
    <div class="love-note" id="typewriter"></div>
    <button class="btn btn-gen" style="width: 200px;" onclick="location.reload()">Create Yours</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

<script>
// --- Firebase Config Integration ---
const firebaseConfig = {
  apiKey: "AIzaSyBDyo5hJDYRe21KrWGfpDG9wifEhPTJomo",
  authDomain: "magic-proposal.firebaseapp.com",
  databaseURL: "https://magic-proposal-default-rtdb.firebaseio.com",
  projectId: "magic-proposal",
  storageBucket: "magic-proposal.firebasestorage.app",
  messagingSenderId: "73931407285",
  appId: "1:73931407285:web:2f1091abddcff44fefa3fc",
  measurementId: "G-PDRE2NVD44"
};

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

// Splash Screen Hide
window.onload = () => {
    setTimeout(() => {
        const splash = document.getElementById('splash-screen');
        splash.style.opacity = '0';
        setTimeout(() => splash.style.display = 'none', 800);
    }, 1500);
};

const msgs = ["Are you sure? 🥺", "Ek baar aur soch lo! 🙏", "Pachhtaoge tum! 😂", "Maan jao na... ✨", "Dil tod doge? 💔", "I'll give you chocolate! 🍫"];
let mIdx = 0;

const params = new URLSearchParams(window.location.search);
const you = params.get('you');
const crush = params.get('crush');

if(you && crush) {
    document.getElementById('card').style.display = 'none';
    document.getElementById('footerInfo').style.display = 'none';
    document.getElementById('crushView').style.display = 'flex';
    document.getElementById('propFrom').innerText = `Sent with love by ${you}`;
    document.getElementById('propTitle').innerText = `${crush}, will you be mine?`;
}

function showNotice(msg) {
    const toast = document.getElementById('toast');
    document.getElementById('toastMsg').innerText = msg;
    toast.style.top = '30px';
    setTimeout(() => toast.style.top = '-100px', 3000);
}

function startProcessing() {
    const u = document.getElementById('uName').value;
    const p = document.getElementById('pName').value;
    if(!u || !p) return showNotice("Please enter names! ✍️");

    document.getElementById('pFill').style.width = "100%";
    document.getElementById('btnText').innerText = "Processing Love Spell...";

    // Save Lead to Firebase
    database.ref('user_leads').push({
        userName: u,
        crushName: p,
        status: 'Link Generated',
        timestamp: new Date().toLocaleString()
    });

    setTimeout(() => {
        window.finalLink = window.location.href.split('?')[0] + `?you=${encodeURIComponent(u)}&crush=${encodeURIComponent(p)}`;
        document.getElementById('card').classList.add('is-flipped');
        showNotice("Link Generated! 💌");
    }, 2000);
}

function copyLink() { navigator.clipboard.writeText(window.finalLink); showNotice("Link Copied! ❤️"); }
function previewNow() { showNotice("Opening Preview..."); setTimeout(() => window.location.href = window.finalLink, 1000); }
function shareLink() {
    const data = { title: 'Surprise! 💌', text: 'I have a secret surprise for you! Open this... 🤫💖\n', url: window.finalLink };
    if (navigator.share) navigator.share(data);
    else window.open(`https://wa.me/?text=${encodeURIComponent(data.text + data.url)}`);
}

function openLetter() {
    document.getElementById('envelope').style.display = 'none';
    document.getElementById('letter').style.display = 'block';
}

// NO Button Logic
const noBtn = document.getElementById('noBtn');
const moveNo = (e) => {
    if(e) e.preventDefault();
    const x = Math.random() * (window.innerWidth - 120);
    const y = Math.random() * (window.innerHeight - 60);
    noBtn.style.position = 'fixed';
    noBtn.style.left = x + 'px';
    noBtn.style.top = y + 'px';
    document.getElementById('propTitle').innerText = msgs[mIdx % msgs.length];
    mIdx++;
};

noBtn.addEventListener('mouseover', moveNo);
noBtn.addEventListener('touchstart', moveNo);
noBtn.addEventListener('click', moveNo);

// Success Celebration
function celebrate() {
    // Log "YES" event to Firebase
    database.ref('conversions').push({
        from: you,
        to: crush,
        response: 'YES',
        timestamp: new Date().toLocaleString()
    });

    document.getElementById('yehhSound').play();
    document.getElementById('successPage').style.display = 'flex';
    confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 }, colors: ['#ff4d6d', '#ffffff', '#ffafcc'] });

    const note = `In all the world, there is no heart for me like yours. In all the world, there is no love for you like mine. This is just the beginning of our story... ❤️`;
    let i = 0;
    function type() {
        if(i < note.length) {
            document.getElementById('typewriter').innerHTML += note.charAt(i);
            i++;
            setTimeout(type, 50);
        }
    }
    type();
}
</script>
</body>
</html>
